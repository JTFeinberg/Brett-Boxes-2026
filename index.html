<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 March Madness Boxes</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #1a1a1a; --light: #f4f7f6; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--light); padding: 10px; color: var(--dark); margin: 0; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        h1 { text-align: center; margin-bottom: 5px; }
        .round-banner { text-align: center; font-weight: bold; color: var(--primary); margin-bottom: 2px; }
        #lastUpdated { text-align: center; font-size: 0.75rem; color: #888; margin-bottom: 20px; font-style: italic; }

        .watchlist-controls { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        select#userSelector { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 220px; }
        
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .user-card { background: white; border: 1px solid #eee; padding: 15px; border-radius: 12px; text-align: center; border-bottom: 4px solid #ddd; position: relative; }
        .user-card.winner { border-color: var(--success); background: #f0fff4; }
        .remove-btn { position: absolute; top: 5px; right: 10px; cursor: pointer; color: #ccc; font-weight: bold; }
        .amount { font-size: 1.4rem; font-weight: 800; color: var(--success); display: block; }

        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; justify-content: center; background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 12px; }
        button { padding: 10px 18px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-csv { background: #4b5563; color: white; display: block; margin: 30px auto; width: 280px; }

        .table-container { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #4b5563; text-transform: uppercase; font-size: 0.75rem; }
        
        .match-row { background-color: #ffffff; }
        .winner-bold { color: #000; font-weight: 800; }
        .hide-mobile { display: none; }
        @media (min-width: 600px) { .hide-mobile { display: table-cell; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🏀 2026 Boxes Tracker</h1>
    <div id="roundInfo" class="round-banner">Detecting Round...</div>
    <div id="lastUpdated">Updated: --:--</div>
    
    <div class="watchlist-controls">
        <select id="userSelector" onchange="addToWatchlist()">
            <option value="">+ Add to Watchlist</option>
        </select>
        <button onclick="clearWatchlist()" style="background:none; color:#999; font-size:11px; text-decoration:underline;">Reset Watchlist</button>
    </div>

    <div id="userSummary" class="summary-grid"></div>

    <div class="controls">
        <input type="date" id="dateInput" value="2026-03-19" style="padding:8px; border-radius:6px; border:1px solid #ccc;">
        <button class="btn-primary" onclick="handleRefresh('daily')">Check Day</button>
        <button class="btn-success" onclick="handleRefresh('total')">Update Standings</button>
    </div>

    <div class="table-container">
        <table id="gameTable">
            <thead><tr><th>Matchup</th><th>Winners</th><th>Digits</th><th class="hide-mobile">Full Score</th></tr></thead>
            <tbody id="gameBody"></tbody>
        </table>
    </div>

    <h3 style="margin-top:40px; border-bottom: 2px solid #000; padding-bottom:5px;">🏆 Tournament Leaderboard</h3>
    <div class="table-container">
        <table id="leaderboard">
            <thead><tr><th>Rank</th><th>Name</th><th>Total Won</th><th>Hits</th></tr></thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>

    <button class="btn-csv" onclick="exportToCSV()">📥 Download 2025-Style CSV</button>
</div>

<script>
    // Full Participant List from spreadsheet
    const participants = [
        {"name":"Randy Gartside","pairs":[{"better":5,"worse":9},{"better":4,"worse":8}]},
        {"name":"Paneer Fitzpatrick-Mehrotra","pairs":[{"better":4,"worse":9}]},
        {"name":"Rowan Kravitt","pairs":[{"better":6,"worse":9}]},
        {"name":"Joe Walsh","pairs":[{"better":7,"worse":9},{"better":1,"worse":5}]},
        {"name":"Suraj Bhogal","pairs":[{"better":3,"worse":9},{"better":0,"worse":5}]},
        {"name":"Jordan Klein","pairs":[{"better":2,"worse":9},{"better":1,"worse":8},{"better":7,"worse":4}]},
        {"name":"Stefan Leon","pairs":[{"better":9,"worse":9},{"better":6,"worse":1},{"better":1,"worse":1},{"better":0,"worse":3}]},
        {"name":"Drew Frankenfield","pairs":[{"better":1,"worse":9},{"better":3,"worse":6}]},
        {"name":"Mike Wilmsen","pairs":[{"better":0,"worse":9},{"better":0,"worse":2}]},
        {"name":"Jake Greenberg","pairs":[{"better":5,"worse":2}]},
        {"name":"Ann Johnston","pairs":[{"better":4,"worse":2}]},
        {"name":"Max Benner","pairs":[{"better":5,"worse":2},{"better":5,"worse":8}]},
        {"name":"Kate Walsh","pairs":[{"better":6,"worse":2}]},
        {"name":"Andrew Cohen","pairs":[{"better":7,"worse":2},{"better":2,"worse":4}]},
        {"name":"Dan Caplan","pairs":[{"better":3,"worse":2},{"better":3,"worse":4}]},
        {"name":"Brett Kravitt","pairs":[{"better":2,"worse":2}]},
        {"name":"Jake Ingber","pairs":[{"better":9,"worse":2},{"better":1,"worse":6}]},
        {"name":"Josie Mehrotra","pairs":[{"better":8,"worse":2}]},
        {"name":"Mike Chilvers","pairs":[{"better":1,"worse":2},{"better":4,"worse":7}]},
        {"name":"Andrew Ray","pairs":[{"better":0,"worse":2},{"better":7,"worse":8}]},
        {"name":"Jake Ruskin","pairs":[{"better":5,"worse":1},{"better":5,"worse":0}]},
        {"name":"Brittany Kravitt","pairs":[{"better":4,"worse":1}]},
        {"name":"Jacob Feinberg","pairs":[{"better":7,"worse":1},{"better":4,"worse":0}]},
        {"name":"Josh Dembowitz","pairs":[{"better":3,"worse":1},{"better":5,"worse":6},{"better":7,"worse":0}]},
        {"name":"Josh Snider","pairs":[{"better":2,"worse":1}]},
        {"name":"Blake Friedman","pairs":[{"better":9,"worse":1},{"better":3,"worse":5}]},
        {"name":"Matt Sterling","pairs":[{"better":8,"worse":1},{"better":9,"worse":3}]},
        {"name":"Zak Sheft","pairs":[{"better":0,"worse":1},{"better":2,"worse":7}]},
        {"name":"Adam Eyman","pairs":[{"better":6,"worse":8},{"better":4,"worse":6},{"better":2,"worse":0},{"better":3,"worse":7}]},
        {"name":"Justin Ivry","pairs":[{"better":3,"worse":8},{"better":9,"worse":6}]},
        {"name":"Avi Raber","pairs":[{"better":2,"worse":8}]},
        {"name":"Noah Bates","pairs":[{"better":9,"worse":8},{"better":2,"worse":7},{"better":1,"worse":3}]},
        {"name":"Ben Guzik","pairs":[{"better":8,"worse":8},{"better":5,"worse":3}]},
        {"name":"Harrison Okin","pairs":[{"better":0,"worse":8},{"better":2,"worse":5}]},
        {"name":"Kevin Goon","pairs":[{"better":6,"worse":6},{"better":1,"worse":7}]},
        {"name":"Jon Raizon","pairs":[{"better":7,"worse":6},{"better":5,"worse":5}]},
        {"name":"Claire Fitzpatrick","pairs":[{"better":2,"worse":6}]},
        {"name":"Steven Grill","pairs":[{"better":1,"worse":6}]},
        {"name":"Leah Jacobs","pairs":[{"better":0,"worse":6}]},
        {"name":"Varun Mehrotra","pairs":[{"better":6,"worse":0}]},
        {"name":"Eric Bishop","pairs":[{"better":3,"worse":0},{"better":8,"worse":7}]},
        {"name":"Stephen Zhong","pairs":[{"better":9,"worse":0}]},
        {"name":"Matt Kleber","pairs":[{"better":8,"worse":0}]},
        {"name":"Tim Berdon","pairs":[{"better":1,"worse":0}]},
        {"name":"Berry Boys","pairs":[{"better":0,"worse":0}]},
        {"name":"Bill Schoonover","pairs":[{"better":4,"worse":5},{"better":7,"worse":5}]},
        {"name":"David McMorrine","pairs":[{"better":6,"worse":5},{"better":4,"worse":3}]},
        {"name":"Scott Okun","pairs":[{"better":2,"worse":5}]},
        {"name":"Billy Lange Hewlett","pairs":[{"better":1,"worse":5}]},
        {"name":"Patrick Garrity","pairs":[{"better":0,"worse":5}]},
        {"name":"Big Rooster","pairs":[{"better":5,"worse":4}]},
        {"name":"Brian Carden","pairs":[{"better":4,"worse":4},{"better":7,"worse":3}]},
        {"name":"Micah Joselow","pairs":[{"better":6,"worse":4}]},
        {"name":"Elena Bishop","pairs":[{"better":2,"worse":4}]},
        {"name":"Quinn Brown","pairs":[{"better":1,"worse":4}]},
        {"name":"Sean Knightly","pairs":[{"better":0,"worse":4},{"better":0,"worse":7}]},
        {"name":"Liam Cross","pairs":[{"better":9,"worse":4}]},
        {"name":"Connor McKenna","pairs":[{"better":5,"worse":7}]},
        {"name":"Paul Berry","pairs":[{"better":6,"worse":7}]},
        {"name":"Marc Sella","pairs":[{"better":7,"worse":7}]},
        {"name":"Elly Sterling","pairs":[{"better":6,"worse":3}]},
        {"name":"Justin Fitzpatrick","pairs":[{"better":2,"worse":3}]},
        {"name":"Stef Montgomery","pairs":[{"better":2,"worse":3}]},
        {"name":"Colm Cross","pairs":[{"better":0,"worse":3}]}
    ];

    const payouts = {
        "1st Round": {H:10, F:15}, "2nd Round": {H:15, F:35}, "Sweet 16": {H:40, F:80},
        "Elite 8": {H:80, F:160}, "Final 4": {H:125, F:230}, "Championship": {H:215, F:505}
    };

    let watchlist = JSON.parse(localStorage.getItem('mm_watchlist')) || ["Jacob Feinberg", "Ben Guzik"];
    let globalStats = {};

    // Populate dropdown
    const selector = document.getElementById('userSelector');
    [...participants].sort((a,b) => a.name.localeCompare(b.name)).forEach(p => {
        let opt = document.createElement('option'); opt.value = p.name; opt.text = p.name;
        selector.add(opt);
    });

    function addToWatchlist() {
        const val = selector.value;
        if (val && !watchlist.includes(val)) {
            watchlist.push(val);
            localStorage.setItem('mm_watchlist', JSON.stringify(watchlist));
            handleRefresh('daily');
        }
        selector.value = "";
    }

    function removeFromWatchlist(name) {
        watchlist = watchlist.filter(n => n !== name);
        localStorage.setItem('mm_watchlist', JSON.stringify(watchlist));
        handleRefresh('daily');
    }

    function clearWatchlist() {
        watchlist = []; localStorage.removeItem('mm_watchlist');
        handleRefresh('daily');
    }

    async function handleRefresh(type) {
        if (type === 'daily') await refreshDaily(); else await refreshTotal();
        document.getElementById('lastUpdated').innerText = `Updated: ${new Date().toLocaleTimeString()}`;
    }

    async function fetchScores(date) {
        const url = `https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${date}&groups=100`;
        const res = await fetch(url);
        const data = await res.json();
        if (!data.events || data.events.length === 0) return { games: [], roundKey: "No Games" };
        
        const headline = data.events[0]?.competitions[0]?.notes[0]?.headline || "";
        let roundKey = Object.keys(payouts).find(k => headline.includes(k)) || "1st Round";

        const games = data.events.map(ev => {
            const teams = ev.competitions[0].competitors.map(t => ({
                name: t.team.displayName, seed: parseInt(t.curatedRank.current) || 99,
                h: t.linescores ? parseInt(t.linescores[0].value) || 0 : 0, f: parseInt(t.score) || 0
            })).sort((a,b) => a.seed - b.seed);
            
            const [B, W] = teams;
            let hits = [];

            // Only calculate hits if game has started
            if (ev.status.type.name !== 'STATUS_SCHEDULED') {
                participants.forEach(p => p.pairs.forEach(pr => {
                    if (pr.better === B.h%10 && pr.worse === W.h%10 && !hits.some(h => h.type === 'H')) {
                        hits.push({name:p.name, type:'H', round:roundKey, amt: payouts[roundKey].H});
                    }
                    if (pr.better === B.f%10 && pr.worse === W.f%10 && !hits.some(h => h.type === 'F')) {
                        hits.push({name:p.name, type:'F', round:roundKey, amt: payouts[roundKey].F});
                    }
                }));
            }
            return {matchup: `${B.seed} ${B.name} vs ${W.seed} ${W.name}`, hits, digits: `H:${B.h%10}:${W.h%10} F:${B.f%10}:${W.f%10}`, score: `${B.h}-${W.h} | ${B.f}-${W.f}`};
        });
        return { games, roundKey };
    }

    async function refreshDaily() {
        const date = document.getElementById('dateInput').value.replace(/-/g,'');
        const { games, roundKey } = await fetchScores(date);
        document.getElementById('roundInfo').innerText = roundKey;
        const body = document.getElementById('gameBody'); body.innerHTML = '';
        const summary = document.getElementById('userSummary'); summary.innerHTML = '';
        
        let dailyWins = {};
        watchlist.forEach(name => dailyWins[name] = {total: 0, hits: 0});

        games.forEach(g => {
            const row = body.insertRow(); row.className = 'match-row';
            g.hits.forEach(h => { if(watchlist.includes(h.name)) { dailyWins[h.name].total += h.amt; dailyWins[h.name].hits++; } });
            row.innerHTML = `<td>${g.matchup}</td><td class="winner-bold">${g.hits.map(h => `${h.name}(${h.type})`).join(', ') || '-'}</td><td>${g.digits}</td><td class="hide-mobile">${g.score}</td>`;
        });

        watchlist.forEach(name => {
            const stats = dailyWins[name];
            const card = document.createElement('div');
            card.className = `user-card ${stats.total > 0 ? 'winner' : ''}`;
            card.innerHTML = `<span class="remove-btn" onclick="removeFromWatchlist('${name}')">✕</span><strong>${name}</strong><span class="amount">$${stats.total}</span><small>${stats.hits} Hits</small>`;
            summary.appendChild(card);
        });
    }

    async function refreshTotal() {
        const start = new Date(2026, 2, 19); const today = new Date();
        participants.forEach(p => globalStats[p.name] = { money: 0, hits: 0, history: [] });

        for (let d = new Date(start); d <= today; d.setDate(d.getDate()+1)) {
            const dStr = d.toISOString().split('T')[0].replace(/-/g,'');
            try {
                const { games } = await fetchScores(dStr);
                games.forEach(g => g.hits.forEach(h => {
                    globalStats[h.name].money += h.amt;
                    globalStats[h.name].hits++;
                    globalStats[h.name].history.push(h);
                }));
            } catch(e) {}
        }

        const sorted = Object.entries(globalStats).sort((a,b) => b[1].money - a[1].money);
        const lbBody = document.getElementById('leaderboardBody'); lbBody.innerHTML = '';
        sorted.forEach(([name, data], i) => {
            lbBody.insertRow().innerHTML = `<td>${i+1}</td><td>${name}</td><td style="color:var(--success); font-weight:bold">$${data.money}</td><td>${data.hits}</td>`;
        });
    }

    function exportToCSV() {
        const rounds = Object.keys(payouts);
        let headerRow = ["Name"];
        rounds.forEach(r => headerRow.push(`${r} Halftime`, `${r} Final`, `${r} Total`));
        headerRow.push("Grand Total");

        const alphaParticipants = [...participants].sort((a,b) => a.name.localeCompare(b.name));
        let rows = [headerRow];

        alphaParticipants.forEach(p => {
            let row = [p.name];
            let grandTotal = 0;
            rounds.forEach(r => {
                const h = globalStats[p.name].history.filter(win => win.round === r && win.type === 'H').reduce((sum, win) => sum + win.amt, 0);
                const f = globalStats[p.name].history.filter(win => win.round === r && win.type === 'F').reduce((sum, win) => sum + win.amt, 0);
                row.push(`$${h}`, `$${f}`, `$${h+f}`);
                grandTotal += (h+f);
            });
            row.push(`$${grandTotal}`); rows.push(row);
        });

        const csv = rows.map(r => r.join(",")).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = '2026_Tournament_Report.csv'; a.click();
    }

    handleRefresh('daily');
</script>
</body>
</html>
